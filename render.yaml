databases:
  - name: shop-db
    plan: free

services:
  - type: web
    name: django-test-shop
    runtime: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: shop-db
          property: connectionString
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: USE_PROXY_SSL_HEADER
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
