<!DOCTYPE html>
<html lang="uk" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>Hop &amp; Barley</title>
</head>
<body style="margin:0;padding:0;width:100%;background-color:#f4f4f2;font-family:Arial,Helvetica,sans-serif;color:#222222;-webkit-text-size-adjust:100%;">
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#f4f4f2;">{% block preheader %}{% endblock %}</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f4f4f2" style="background-color:#f4f4f2;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e6e6e3;">
          <tr>
            <td bgcolor="#1a6b3a" style="background-color:#1a6b3a;padding:22px 32px;">
              <span style="color:#ffffff;font-size:22px;font-weight:bold;letter-spacing:0.5px;">🍺 Hop &amp; Barley</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background-color:#f0f0ee;color:#888888;font-size:12px;line-height:1.6;">
              Hop &amp; Barley — інгредієнти для домашнього пивоваріння.<br>
              Питання? Напишіть на <a href="mailto:support@hopbarley.example" style="color:#1a6b3a;text-decoration:none;">support@hopbarley.example</a>.<br>
              Це автоматичний лист — відповідати на нього не потрібно.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
