<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hop &amp; Barley</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f2;font-family:Arial,Helvetica,sans-serif;color:#222222;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f2;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:100%;background:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e6e6e3;">
          <tr>
            <td style="background:#1a6b3a;padding:20px 32px;">
              <span style="color:#ffffff;font-size:22px;font-weight:bold;letter-spacing:0.5px;">🍺 Hop &amp; Barley</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:18px 32px;background:#f0f0ee;color:#888888;font-size:12px;line-height:1.5;">
              Hop &amp; Barley — інгредієнти для домашнього пивоваріння.<br>
              Це автоматичний лист, відповідати на нього не потрібно.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
