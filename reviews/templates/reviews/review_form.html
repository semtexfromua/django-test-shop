{% extends "base.html" %}
{% block title %}Відгук — {{ product.name }}{% endblock %}
{% block content %}
<div class="container account-page">
  <h1>Відгук: {{ product.name }}</h1>
  <form class="auth-form" method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="InputField">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% for e in field.errors %}<p class="error">{{ e }}</p>{% endfor %}
    </div>
    {% endfor %}
    <div class="ButtonGroup"><button type="submit" class="button button--primary">Надіслати відгук</button></div>
  </form>
  <p><a href="{{ product.get_absolute_url }}">← Назад до товару</a></p>
</div>
{% endblock %}
