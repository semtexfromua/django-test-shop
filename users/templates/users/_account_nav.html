{% load static %}
{# Підключення: {% include "users/_account_nav.html" with active="orders" %} #}
<aside class="account-nav">
  <div class="account-nav__user">
    <span class="avatar">{{ user.username|slice:":1"|upper }}</span>
    <div>
      <div style="font-size:15px;font-weight:700;">{{ user.username }}</div>
      <div style="font-size:13px;color:var(--hb-grey-light);">{{ user.email }}</div>
    </div>
  </div>
  <a href="{% url 'users:profile' %}" class="{% if active == 'profile' %}is-active{% endif %}"><i class="fa-regular fa-user"></i> Профіль</a>
  <a href="{% url 'orders:list' %}" class="{% if active == 'orders' %}is-active{% endif %}"><i class="fa-solid fa-box"></i> Мої замовлення</a>
  <a href="{% url 'users:password_change' %}" class="{% if active == 'password' %}is-active{% endif %}"><i class="fa-solid fa-key"></i> Зміна пароля</a>
  <form method="post" action="{% url 'users:logout' %}" style="margin:0;">
    {% csrf_token %}
    <button type="submit" class="is-danger" style="width:100%;border:none;background:none;text-align:left;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;font-size:14px;font-weight:500;color:#c0392b;"><i class="fa-solid fa-arrow-right-from-bracket" style="width:18px;"></i> Вийти</button>
  </form>
</aside>
